name: Publish to NuGet

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test Tests/Microsoft.OpenAPI.FunctionalExtensions.Tests/ -c Release --no-build --verbosity normal

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(grep -oP '<VersionPrefix>\K[^<]+' Directory.Build.props)
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "Using version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Pack packages
        run: |
          dotnet pack Microsoft.OpenAPI.FunctionalExtensions/Microsoft.OpenAPI.FunctionalExtensions.fsproj \
            -c Release --no-build /p:Version=${{ steps.version.outputs.version }} -o artifacts
          dotnet pack Microsoft.OpenAPI.FunctionalExtensions.Visualizing/Microsoft.OpenAPI.FunctionalExtensions.Visualizing.fsproj \
            -c Release --no-build /p:Version=${{ steps.version.outputs.version }} -o artifacts
          dotnet pack Microsoft.OpenAPI.FunctionalExtensions.Visualizing.Tool/Microsoft.OpenAPI.FunctionalExtensions.Visualizing.Tool.fsproj \
            -c Release --no-build /p:Version=${{ steps.version.outputs.version }} -o artifacts
          dotnet pack Microsoft.OpenAPI.FunctionalExtensions.Linting/Microsoft.OpenAPI.FunctionalExtensions.Linting.fsproj \
            -c Release --no-build /p:Version=${{ steps.version.outputs.version }} -o artifacts

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
