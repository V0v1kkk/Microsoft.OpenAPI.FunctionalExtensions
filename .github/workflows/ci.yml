name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Microsoft.OpenAPI.FunctionalExtensions.sln

      - name: Build
        run: dotnet build Microsoft.OpenAPI.FunctionalExtensions.sln -c Release --no-restore

      - name: Test
        run: dotnet test Microsoft.OpenAPI.FunctionalExtensions.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"


