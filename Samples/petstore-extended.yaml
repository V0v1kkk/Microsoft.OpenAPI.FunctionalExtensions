openapi: "3.0.0"
info:
  version: 1.0.0
  title: Swagger Petstore Extended
servers:
  - url: http://petstore.swagger.io/v2
paths:
  /owners:
    get:
      summary: List all owners
      operationId: listOwners
      tags: [owners]
      responses:
        '200':
          description: Owners list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Owner"
components:
  schemas:
    Owner:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

